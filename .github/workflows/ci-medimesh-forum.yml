name: "MediMesh — Forum Service CI/CD Pipeline"

on:
  push:
    branches: [main]
    paths:
      - "/"

  pull_request:
    branches: [main]
    paths:
      - "/"

  workflow_dispatch:

jobs:
# ============================================================
# ① SONARQUBE
# ============================================================
  sonar-forum:
    name: "① SonarQube — medimesh-forum"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Analysis
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: services/medimesh-forum
          args: >
            -Dsonar.projectKey=medimesh-forum
            -Dsonar.projectName=medimesh-forum
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ MediMesh CI Failed — SonarQube (medimesh-forum)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            ❌ SonarQube scan FAILED for: medimesh-forum

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

# ============================================================
# ② BUILD + ③ SNYK
# ============================================================
  build-forum:
    name: "②③ Build & Snyk — medimesh-forum"
    runs-on: ubuntu-latest
    needs: sonar-forum
    defaults:
      run:
        working-directory: services/medimesh-forum
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "services/medimesh-forum/package.json"

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Build Project
        run: npm run build --if-present

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Snyk Security Scan
        run: |
          snyk test \
            --severity-threshold=high \
            --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk Report to HTML
        run: |
          if [ -f snyk-report.json ]; then
            snyk-to-html -i snyk-report.json -o snyk-report.html
            echo "✅ Snyk HTML report generated"
          else
            echo "⚠️ No Snyk JSON report found"
          fi

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-medimesh-forum
          path: |
            services/medimesh-forum/snyk-report.html
            services/medimesh-forum/snyk-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ MediMesh CI Failed — Build (medimesh-forum)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            ❌ Build/Snyk FAILED for: medimesh-forum

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

# ============================================================
# ④⑤⑥ DOCKER BUILD + TRIVY + PUSH
# ============================================================
  docker-forum:
    name: "④⑤⑥ Docker — medimesh-forum"
    runs-on: ubuntu-latest
    needs: build-forum
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Semantic Version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: "medimesh-forum/v"
          default_bump: patch
          initial_version: "1.0.0"
          custom_release_rules: "feature:minor:Features,breaking:major:Breaking Changes"
          dry_run: ${{ github.event_name == 'pull_request' }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Image Tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${{ steps.version.outputs.new_version }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/medimesh_medimesh-forum"

          echo "tag_version=${IMAGE}:v${VERSION}"          >> $GITHUB_OUTPUT
          echo "tag_sha=${IMAGE}:v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=${IMAGE}:latest"                >> $GITHUB_OUTPUT
          echo "version=v${VERSION}"                       >> $GITHUB_OUTPUT

          echo "════════════════════════════════════════"
          echo "  Image  : ${IMAGE}"
          echo "  Version: v${VERSION}"
          echo "  SHA    : v${VERSION}-${SHORT_SHA}"
          echo "════════════════════════════════════════"

      - name: "④ Build Docker Image"
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag_version }} \
            -t ${{ steps.meta.outputs.tag_sha }} \
            -t ${{ steps.meta.outputs.tag_latest }} \
            -f Dockerfile \
            services/medimesh-forum

      - name: "⑤ Trivy — Container Scan"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.meta.outputs.tag_version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: "⑥ Push Docker Image to DockerHub"
        if: github.event_name != 'pull_request'
        run: |
          echo "🚀 Pushing images..."
          docker push ${{ steps.meta.outputs.tag_version }}
          docker push ${{ steps.meta.outputs.tag_sha }}
          docker push ${{ steps.meta.outputs.tag_latest }}
          echo "✅ All tags pushed"

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ MediMesh CI Failed — Docker (medimesh-forum)"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            ❌ Docker build/push FAILED for: medimesh-forum

            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

# ============================================================
# ⑦ CD — ARGOCD MANIFEST UPDATE
# ============================================================
  cd-forum:
    name: "⑦ CD — medimesh-forum"
    runs-on: ubuntu-latest
    needs: docker-forum
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout ArgoCDrepo
        uses: actions/checkout@v4
        with:
          repository: Medimesh-grp3/ArgoCDrepo
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Show current tag
        run: |
          echo "Current tag for forum:"
          yq '.forum.image.tag' helm/medimesh/values.yaml

      - name: Update image tag
        run: |
          yq -i \
            '.forum.image.tag = "${{ needs.docker-forum.outputs.version }}"' \
            helm/medimesh/values.yaml

          echo "New tag for forum:"
          yq '.forum.image.tag' helm/medimesh/values.yaml

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/medimesh/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🚀 cd(medimesh-forum): image → ${{ needs.docker-forum.outputs.version }}"

          for i in 1 2 3 4 5; do
            git push && break
            echo "⚠️ Push failed, retry $i/5..."
            git pull --rebase origin main
            sleep $((i * 2))
          done

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚀 MediMesh CD — medimesh-forum deploying ${{ needs.docker-forum.outputs.version }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CD Pipeline
          body: |
            ════════════════════════════════════════════════════
            🚀 MediMesh CD — Deployment Triggered
            ════════════════════════════════════════════════════

            Service   : medimesh-forum
            New Image : ${{ needs.docker-forum.outputs.version }}
            Values Key: forum.image.tag

            ArgoCD will auto-sync to cluster within 3 minutes.

            ArgoCDrepo: https://github.com/Medimesh-grp3/ArgoCDrepo
            ════════════════════════════════════════════════════

      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ MediMesh CD Failed — medimesh-forum"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CD Pipeline
          body: |
            ❌ CD manifest update FAILED for: medimesh-forum

            Image Tag  : ${{ needs.docker-forum.outputs.version }}
            Author     : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
